name: 🚀 Release

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  release-please:
    name: Release Please
    uses: equinor/ops-actions/.github/workflows/release-please.yml@c1be86e02c64b0d2db5c2dba532b5580cdce168d # v9.38.0
    permissions:
      contents: write
      pull-requests: write
      issues: write
    with:
      release_type: node

  deploy-dev:
    name: Deploy Dev
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/docker.yml
    secrets:
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    with:
      tag: dev
      environment: dev
      api_url: https://garge-api-dev.prod.tumogroup.com/api
      tag_latest: false

  deploy-prod:
    name: Deploy Prod
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/docker.yml
    secrets:
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
      environment: prod
      api_url: https://garge-api.prod.tumogroup.com/api
      tag_latest: true

  update-chart:
    name: Update Chart
    needs: [release-please, deploy-prod]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: sondresjolyst/garge/.github/workflows/update-chart.yml@main
    secrets:
      GARGE_PAT: ${{ secrets.GARGE_PAT }}
    with:
      chart_name: garge-app
      tag: ${{ needs.release-please.outputs.tag_name }}
