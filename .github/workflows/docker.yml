name: 🔨 Build and Push Docker Image

on:
  pull_request:
  workflow_call:
    inputs:
      tag:
        description: "Tag for the Docker image"
        type: string
        required: true
      environment:
        description: "Deployment environment (dev or prod)"
        type: string
        required: true
      api_url:
        description: "NEXT_PUBLIC_API_URL baked into the build"
        type: string
        required: true
      tag_latest:
        description: "Also tag the image as latest"
        type: boolean
        default: false
    secrets:
      DOCKER_PASSWORD:
        required: true

permissions: {}

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '23'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://garge-api-dev.prod.tumogroup.com/api

  build-and-push:
    if: inputs.tag != ''
    permissions:
      contents: read
      packages: read
    uses: equinor/ops-actions/.github/workflows/docker.yml@8c9c3b94821100c8101be18193ad8136c24c6167 # v9.38.3
    secrets:
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    with:
      build_args: '{"NEXT_PUBLIC_API_URL":"${{ inputs.api_url }}"}'
      environment: ${{ inputs.environment }}
      registry: registry.hub.docker.com
      username: sondresjo
      repository: sondresjo/garge-app
      tag: ${{ inputs.tag }}
      tag_latest: ${{ inputs.tag_latest }}
