name: 🔨 Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag for the Docker image"
        required: true
  release:
    types:
      - published
  push:
    branches:
      - development
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '23'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://garge-api-dev.prod.tumogroup.com/api

  dev:
    needs: test
    if: github.ref == 'refs/heads/development'
    uses: equinor/ops-actions/.github/workflows/docker.yml@e925ef9959a37d43073b77efa2f73c64253fbd55 # v9.37.2
    secrets:
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    with:
      build_args: '{"NEXT_PUBLIC_API_URL":"https://garge-api-dev.prod.tumogroup.com/api"}'
      environment: dev
      registry: registry.hub.docker.com
      username: sondresjo
      repository: sondresjo/garge-app
      tag: dev
      tag_latest: false

  prod:
    needs: test
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    uses: equinor/ops-actions/.github/workflows/docker.yml@e925ef9959a37d43073b77efa2f73c64253fbd55 # v9.37.2
    secrets:
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    with:
      build_args: '{"NEXT_PUBLIC_API_URL":"https://garge-api.prod.tumogroup.com/api"}'
      environment: prod
      registry: registry.hub.docker.com
      username: sondresjo
      repository: sondresjo/garge-app
      tag: ${{ github.event.release.tag_name || github.event.inputs.tag }}
      tag_latest: true
